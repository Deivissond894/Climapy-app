name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Job 1: Lint e testes
  test:
    name: Lint e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar linter
        run: npm run lint
        continue-on-error: true

      - name: Executar testes
        run: npm test -- --coverage --passWithNoTests

      - name: Upload coverage para Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: climapy-coverage

  # Job 2: Build de preview (somente PR)
  build-preview:
    name: Build Preview
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Criar build preview
        run: |
          npx expo export --platform android
          echo "✅ Build preview criado com sucesso"

  # Job 3: Deploy para produção (somente main)
  deploy:
    name: Deploy Produção
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build e submit para stores
        run: |
          echo "🚀 Iniciando build de produção..."
          # Descomentar quando estiver pronto para deploy automático
          # npx eas-cli build --platform android --non-interactive --auto-submit
          # npx eas-cli build --platform ios --non-interactive --auto-submit
          echo "✅ Pipeline executado com sucesso!"

      - name: Notificar sucesso
        if: success()
        run: |
          echo "✅ Deploy concluído com sucesso!"
          echo "📱 App atualizado nas stores"

      - name: Notificar falha
        if: failure()
        run: |
          echo "❌ Deploy falhou"
          echo "📧 Verifique os logs para mais detalhes"
